# v1 preset — data-analyst roles, Ireland-focused with Eurozone context.
#
# Each phase flips one source on:
#   P1 enables adzuna; P3 enables greenhouse/lever/ashby/personio;
#   P4 enables the benchmarks block (cso + eurostat; oecd disabled per ADR-011).
#
# Adding a new role/geo = copy this file, change ids/keywords/countries.

preset_id: data_analyst_ireland
title: "Data Analyst — Ireland"
description: >
  Job postings for data-analyst-flavoured roles in Ireland, with Eurozone-wide
  context via Adzuna. Salary benchmarked against CSO Ireland and OECD.

# ISCO-08 4-digit codes the dashboard surfaces front-and-centre.
isco_focus:
  - "2521"  # Database designers and administrators
  - "2511"  # Systems analysts
  - "2423"  # Personnel and careers professionals (analytics adjacent)

sources:
  adzuna:
    enabled: true
    # Adzuna does NOT serve "ie" in 2026. We use "gb" as a labour-market proxy
    # (English-language, geographically adjacent, similar wage levels) until
    # Adzuna adds Ireland. Real Irish coverage comes from ATS adapters below.
    countries: ["gb"]
    keywords: ["data analyst", "analytics engineer", "bi analyst"]
    max_results: 500
    results_per_page: 50
    max_pages: 5
    min_interval_hours: 24    # refresh.yml honours this; raise if free tier bites

  greenhouse:
    enabled: true
    companies_file: config/companies/dublin_tech.yaml
    keywords: ["analyst", "analytics"]
    countries: ["ie", "remote-europe"]

  lever:
    enabled: true
    companies_file: config/companies/dublin_tech.yaml
    keywords: ["analyst", "analytics"]
    countries: ["ie", "remote-europe"]

  ashby:
    enabled: true
    companies_file: config/companies/dublin_tech.yaml
    keywords: ["analyst", "analytics"]
    countries: ["ie", "remote-europe"]
    include_compensation: true

  personio:
    enabled: true
    companies_file: config/companies/dublin_tech.yaml
    keywords: ["analyst", "analytics", "analytiker"]
    countries: ["ie", "de"]   # Personio is German-skewed; include DE for slug fan-out

  remotive:
    # Excluded — see DECISIONS.md ADR-009.
    # Remotive ToS §8 prohibits redistribution + commercial database-building;
    # the public-API README's attribution back-link advice does not override.
    enabled: false

  # HN Algolia + LLM-assisted comment parsing are descoped from v1 — see ADR-013.
  # When they return, restore an `hn_algolia` block here.

benchmarks:
  cso:
    enabled: true
    countries: ["IE"]
    isco_codes: ["2521", "2511", "2423"]
    min_interval_hours: 168    # CSO PxStat is quarterly; weekly recheck is plenty

  oecd:
    # Adapter ships disabled. The live endpoint at sdmx.oecd.org is fronted by
    # Cloudflare bot protection, which returns 403 + HTML to unauthenticated
    # GitHub-Actions workers. Flip back to true once we have a workaround
    # (auth header, mirror CSV, fixed-egress proxy). The adapter is fully
    # implemented and fixture-tested.
    enabled: false
    countries: ["IE", "DE", "FR", "NL", "ES"]
    isco_codes: ["2521", "2511", "2423"]
    min_interval_hours: 720    # monthly cadence (OECD ELS series is annual)

  eurostat:
    enabled: true
    countries: ["IE", "DE", "FR", "NL", "ES"]
    isco_codes: ["2511", "2521", "2423"]
    min_interval_hours: 720    # monthly cadence (SES rebases every 4 years)

publish:
  partition_by: ["country", "year_month"]
  retention_days: 365
