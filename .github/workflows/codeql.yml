name: codeql

# CodeQL static analysis across the Python pipeline (src/jobpipe) and the
# JavaScript dashboard (site/). Free on public repos. Findings surface in the
# repository Security tab.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"   # Monday 08:00 UTC, after Dependabot's 06:00 tick

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: codeql-${{ github.ref }}-${{ matrix.language }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
