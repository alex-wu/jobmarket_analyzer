name: scorecard

# OpenSSF Scorecard — weekly automated supply-chain security audit.
# Publishes results to <https://scorecard.dev> and uploads SARIF to the
# repo's Security tab. Free on public repos.

on:
  branch_protection_rule:
  schedule:
    - cron: "0 9 * * 1"   # Monday 09:00 UTC, after CodeQL's 08:00 tick
  push:
    branches: [main]

permissions: read-all

concurrency:
  group: scorecard
  cancel-in-progress: false

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
